<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Karen Ashimyan">
  <meta name="description" content="For GIT 480 final project, but also a project I am actually passionate about continuing to build further!">
  <title>AllBeAm</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" class="app">
    <div class="main-container">
      <div class="tabs-container">
        <div class="main-tabs">
          <button class="main-tab active" data-tab="plan">PLAN</button>
          <button class="main-tab" data-tab="flow">FLOW</button>
          <button class="main-tab" data-tab="shift">SHIFT</button>
        </div>
        <div class="right-tabs">
          <button class="main-tab" data-tab="set">SET</button>
          <button class="settings-btn" id="themeBtn">⚙</button>
        </div>
      </div>

      <div class="subtabs-container" id="subtabsContainer">
        <div class="subtabs-row" id="subtabsRow"></div>
      </div>

      <div class="content-area" id="contentArea"></div>
    </div>

    <div class="modal hidden" id="themeModal">
      <div class="modal-overlay" id="modalOverlay"></div>
      <div class="modal-content">
        <div id="themePanel" class="modal-panel">
          <div class="theme-grid" id="themeGrid"></div>
        </div>
      </div>
    </div>

    <div class="modal hidden" id="routineModal">
      <div class="modal-overlay" id="routineModalOverlay"></div>
      <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <div class="card-title" style="margin: 0;">Select Item</div>
          <button style="background: none; border: none; color: var(--text-dark); font-size: 24px; cursor: pointer; padding: 0;" onclick="Actions.closeRoutineModal()">✕</button>
        </div>
        <div id="routineItemList" style="max-height: 400px; overflow-y: auto;"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
